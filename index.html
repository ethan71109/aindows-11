<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIndows 11</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='2' y='2' width='13' height='13' rx='3' fill='%234cc2ff'/%3E%3Crect x='17' y='2' width='13' height='13' rx='3' fill='%238a6bff'/%3E%3Crect x='2' y='17' width='13' height='13' rx='3' fill='%230067c0'/%3E%3Crect x='17' y='17' width='13' height='13' rx='3' fill='%23ff8ad4'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/os.css?v=1.0.13" />
</head>
<body>

  <!-- Boot screen -->
  <div id="boot">
    <div class="boot-logo">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="boot-name">AIndows 11</div>
    <div class="boot-spinner">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="boot-hint">dreaming an operating system…</div>
  </div>

  <!-- Desktop -->
  <div id="desktop">
    <div id="icons"></div>
    <div id="windows"></div>
  </div>

  <!-- Snap layout preview -->
  <div id="snap-preview" class="hidden"></div>

  <!-- Start menu -->
  <div id="startmenu" class="hidden">
    <input id="start-search" type="text" autocomplete="off"
           placeholder="Search — or type ANY app name and press Enter to summon it" />
    <div class="start-label">Pinned</div>
    <div id="start-apps"></div>
    <div id="start-footer">
      <div class="start-user">🙂 <span>you</span></div>
      <button id="power-btn" title="Restart">⏻</button>
    </div>
  </div>

  <!-- Copilot panel -->
  <div id="copilot" class="hidden">
    <div class="cp-head">
      <span>🤖 Copilot</span>
      <button id="cp-clear" title="Clear conversation">🧹</button>
    </div>
    <div id="cp-msgs"></div>
    <form id="cp-form" autocomplete="off">
      <input id="cp-input" type="text" placeholder="Ask me — or tell me to do something…" />
      <button type="submit" title="Send">➤</button>
    </form>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <div id="taskbar-center">
      <button id="start-btn" title="Start">
        <span class="win-logo"><i></i><i></i><i></i><i></i></span>
      </button>
      <button id="copilot-btn" title="Copilot">🤖</button>
      <div id="taskbar-apps"></div>
    </div>
    <div id="tray">
      <div id="spend" title="Estimated API spend"></div>
      <div id="ai-status" title="AI engine status">●</div>
      <div id="clock">
        <div id="clock-time">00:00</div>
        <div id="clock-date">1/1/2026</div>
      </div>
    </div>
  </div>

  <script src="js/fs.js?v=1.0.13"></script>
  <script src="js/ai.js?v=1.0.13"></script>
  <script src="js/apps.js?v=1.0.13"></script>
  <script src="js/os.js?v=1.0.13"></script>
</body>
</html>
